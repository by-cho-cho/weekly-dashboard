!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>생산부 주간 대시보드</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0A0E18;
    --bg-card: #131826;
    --bg-card-hi: #1A2032;
    --border: #243049;
    --text-primary: #EDF2FB;
    --text-secondary: #B8C2D9;
    --text-muted: #6B7693;
    --gold: #C9A961;
    --cyan: #4FC3F7;
    --mint: #00E5A0;
    --red: #E63946;
    --amber: #FFB547;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Pretendard', -apple-system, sans-serif;
    font-size: 13px;
  }
  body {
    background:
      radial-gradient(ellipse at top, rgba(201,169,97,0.08), transparent 50%),
      radial-gradient(ellipse at bottom, rgba(79,195,247,0.05), transparent 50%),
      var(--bg-deep);
    min-height: 100vh;
  }
  .num { font-family: 'IBM Plex Sans', sans-serif; font-variant-numeric: tabular-nums; }
  .card {
    background: linear-gradient(135deg, var(--bg-card), var(--bg-card-hi));
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }
  .header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,14,24,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
  }
  .btn {
    padding: 8px 16px; border-radius: 8px; font-weight: 700; font-size: 12px;
    cursor: pointer; border: 1px solid var(--border);
    background: rgba(255,255,255,0.03); color: var(--text-secondary);
    transition: all .2s;
  }
  .btn:hover { background: rgba(255,255,255,0.06); }
  .btn.active {
    background: linear-gradient(135deg, rgba(201,169,97,0.22), rgba(201,169,97,0.08));
    border-color: var(--gold); color: var(--gold);
  }
  .btn[data-dept="2반"].active {
    background: linear-gradient(135deg, rgba(230,57,70,0.22), rgba(230,57,70,0.08));
    border-color: var(--red); color: var(--red);
  }
  .chip {
    display: inline-flex; align-items: center;
    padding: 4px 11px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    cursor: pointer; border: 1px solid; transition: all .15s;
    user-select: none;
  }
  .chip-month        { color: var(--cyan); border-color: rgba(79,195,247,0.35); background: rgba(79,195,247,0.05); }
  .chip-month.active { background: rgba(79,195,247,0.22); border-color: var(--cyan); }
  .kpi-label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .kpi-val { font-size: 30px; font-weight: 700; font-family: 'IBM Plex Sans', sans-serif; font-variant-numeric: tabular-nums; line-height: 1.1; }
  .kpi-sub { font-size: 11px; color: var(--text-secondary); margin-top: 6px; }
  .up   { color: var(--mint); }
  .down { color: var(--red); }
  table.exec th, table.exec td { padding: 8px 12px; }
  table.exec thead th {
    background: rgba(255,255,255,0.03); color: var(--text-muted);
    font-size: 11px; font-weight: 600; text-align: left;
    border-bottom: 1px solid var(--border);
  }
  table.exec tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); }
  table.exec tbody tr:hover { background: rgba(255,255,255,0.02); }
</style>
</head>
<body>

<!-- 로딩 -->
<div id="loadingOverlay" style="position:fixed;inset:0;z-index:99999;background:rgba(10,14,24,0.97);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
  <div style="font-size:18px;color:#C9A961;font-weight:700;letter-spacing:0.05em;">주간 데이터 로딩 중</div>
  <div style="width:220px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;">
    <div style="height:100%;background:linear-gradient(90deg,#C9A961,#4FC3F7);animation:ldbar 1.6s ease-in-out infinite;"></div>
  </div>
  <style>@keyframes ldbar{0%{transform:translateX(-100%)}50%{transform:translateX(60%)}100%{transform:translateX(220%)}}</style>
</div>

<!-- 헤더 -->
<header class="header">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
    <div>
      <h1 style="font-size:20px;font-weight:800;margin:0;letter-spacing:-0.01em;">
        생산<span id="deptTitle" style="color:var(--gold);">1반</span> <span style="color:var(--text-muted);font-size:14px;font-weight:600;">주간 변동 현황</span>
      </h1>
      <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">
        <span id="syncDate">—</span> 기준 · 주간 단위 집계
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <span style="font-size:10px;color:var(--text-muted);">부서</span>
      <button class="btn active" data-dept="1반" onclick="switchDept('1반')">1반</button>
      <button class="btn" data-dept="2반" onclick="switchDept('2반')">2반</button>
    </div>
  </div>

  <!-- 월 필터 -->
  <div style="margin-top:12px;padding-top:10px;border-top:1px dashed rgba(255,255,255,0.08);display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <span style="font-size:11px;font-weight:700;color:var(--text-muted);">월 선택</span>
    <div id="monthChips" style="display:flex;flex-wrap:wrap;gap:4px;flex:1;"></div>
    <button class="btn" onclick="selectAllMonths()" style="font-size:10px;padding:5px 12px;">전체</button>
    <button class="btn" onclick="selectRecentMonths()" style="font-size:10px;padding:5px 12px;">최근 3개월</button>
  </div>
</header>

<!-- KPI 카드 -->
<section style="padding:18px 32px 0;">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">
    <div class="card">
      <div class="kpi-label">최근주 수주</div>
      <div class="kpi-val" style="color:var(--gold);" id="kpiOrder">—</div>
      <div class="kpi-sub" id="kpiOrderSub">—</div>
    </div>
    <div class="card">
      <div class="kpi-label">최근주 생산</div>
      <div class="kpi-val" style="color:var(--cyan);" id="kpiProd">—</div>
      <div class="kpi-sub" id="kpiProdSub">—</div>
    </div>
    <div class="card">
      <div class="kpi-label">최근주 출고</div>
      <div class="kpi-val" style="color:var(--mint);" id="kpiShip">—</div>
      <div class="kpi-sub" id="kpiShipSub">—</div>
    </div>
    <div class="card">
      <div class="kpi-label">최근주 불량</div>
      <div class="kpi-val" style="color:var(--red);" id="kpiDef">—</div>
      <div class="kpi-sub" id="kpiDefSub">—</div>
    </div>
  </div>
</section>

<!-- 주간 추이 차트 -->
<section style="padding:18px 32px 0;">
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;">
      <div>
        <div class="kpi-label">주간 추이 (수주 · 생산 · 출고 · 불량)</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px;" id="trendSub">—</div>
      </div>
      <div style="display:flex;gap:4px;align-items:center;padding:4px 8px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;">
        <span style="font-size:10px;color:var(--text-muted);margin-right:2px;">지표</span>
        <span class="chip metric active" data-metric="수주" onclick="toggleMetric('수주')" style="color:#C9A961;border-color:rgba(201,169,97,0.4);background:rgba(201,169,97,0.15);">수주</span>
        <span class="chip metric active" data-metric="생산" onclick="toggleMetric('생산')" style="color:#4FC3F7;border-color:rgba(79,195,247,0.4);background:rgba(79,195,247,0.15);">생산</span>
        <span class="chip metric active" data-metric="출고" onclick="toggleMetric('출고')" style="color:#00E5A0;border-color:rgba(0,229,160,0.4);background:rgba(0,229,160,0.15);">출고</span>
        <span class="chip metric active" data-metric="불량" onclick="toggleMetric('불량')" style="color:#E63946;border-color:rgba(230,57,70,0.4);background:rgba(230,57,70,0.15);">불량</span>
      </div>
    </div>
    <div id="chartTrend" style="height:380px;"></div>
  </div>
</section>

<!-- 주차별 상세표 -->
<section style="padding:18px 32px 30px;">
  <div class="card">
    <div class="kpi-label">주차별 상세 (전주 대비)</div>
    <div id="weekTable" style="margin-top:10px;"></div>
  </div>
</section>

<script>
const SHEET_ID = '1SX8ZOh2i4LrH9X7HSQ3RhrxREeGl7Vl6qcu42Uf8qro';
const GIDS = { '1반': '2145094968', '2반': '680125344' };
const METRICS = ['수주','생산','출고','불량'];
const METRIC_COLORS = { '수주':'#C9A961', '생산':'#4FC3F7', '출고':'#00E5A0', '불량':'#E63946' };
const APP = {
  dept: '1반',
  data: { '1반': null, '2반': null },
  selectedMonths: new Set(),
  activeMetrics: new Set(METRICS),
  chart: null,
};

function parseCSV(text){
  const rows=[]; let row=[],cell='',q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cell+='"';i++;} else q=false; } else cell+=c; }
    else { if(c==='"')q=true;
      else if(c===','){row.push(cell);cell='';}
      else if(c==='\n'){row.push(cell);rows.push(row);row=[];cell='';}
      else if(c!=='\r')cell+=c; }
  }
  if(cell||row.length){row.push(cell);rows.push(row);}
  return rows;
}
const parseNum = v => {
  if (v == null || v === '') return 0;
  const n = Number(String(v).replace(/,/g, '').trim());
  return isFinite(n) ? n : 0;
};
const fmtN = v => v == null ? '—' : Math.round(v).toLocaleString();

/* ============================================================
   주간 컬럼 파싱
   시트 패턴: "M월 계획" 헤더 다음으로 각 주차마다
     "M-W 수주", "계획", "M월W주 생산", "출고", "불량", "성능", "외관", "기타"
   ============================================================ */
function buildWeeklyColumnMap(headers) {
  // 결과: weeklyMap[month][week] = { 수주, 생산, 출고, 불량 } 컬럼 인덱스
  const map = {};
  for (let i = 0; i < headers.length; i++) {
    const h = (headers[i]||'').trim();
    // "M-W 수주" 패턴
    const m1 = h.match(/^(\d{1,2})-(\d)\s*수주$/);
    if (m1) {
      const mo = +m1[1], wk = +m1[2];
      map[mo] = map[mo] || {};
      // 수주: i, 계획: i+1, 생산: i+2, 출고: i+3, 불량: i+4
      map[mo][wk] = { 수주: i, 생산: i+2, 출고: i+3, 불량: i+4 };
    }
  }
  return map;
}

function parseSheet(csvText, dept) {
  const rows = parseCSV(csvText);
  const headers = rows[0] || [];
  const wmap = buildWeeklyColumnMap(headers);

  // 1반은 model 컬럼이 [2], 2반은 [0]
  const modelCol = dept === '1반' ? 2 : 0;
  const specCol = dept === '1반' ? 3 : 1;

  const items = [];
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r]; if (!row) continue;
    const model = (row[modelCol]||'').trim();
    if (!model) continue;
    if (/^(total|item|품명|품목|spec|규격|전품목)$/i.test(model)) continue;
    // 1반: 카테고리 헤더 행 (Black Eye, Blue Eye 등) 일부 스킵 — 모델명에 매출 정보 없는 경우만 포함
    const weekData = {}; // weekData[mo][wk] = {수주,생산,출고,불량}
    let hasAny = false;
    for (const mo of Object.keys(wmap)) {
      weekData[mo] = {};
      for (const wk of Object.keys(wmap[mo])) {
        const c = wmap[mo][wk];
        const w = {};
        for (const me of METRICS) w[me] = parseNum(row[c[me]]);
        weekData[mo][wk] = w;
        if (w.수주 + w.생산 + w.출고 + w.불량 > 0) hasAny = true;
      }
    }
    if (!hasAny) continue;
    items.push({ model, spec: (row[specCol]||'').trim(), weekData });
  }
  return { items, weeksByMonth: getWeeksByMonth(wmap) };
}

function getWeeksByMonth(wmap) {
  // 각 월별로 존재하는 주차 번호 목록
  const r = {};
  for (const mo of Object.keys(wmap)) {
    r[+mo] = Object.keys(wmap[mo]).map(Number).sort((a,b)=>a-b);
  }
  return r;
}

/* ============================================================
   집계
   ============================================================ */
function aggregateByWeek(items, months) {
  // months: 정렬된 월 배열 → 결과: [{label:"5월1주", 수주, 생산, 출고, 불량, mo, wk}, ...]
  const out = [];
  for (const mo of months) {
    const weeks = items[0]?.weekData?.[mo] ? Object.keys(items[0].weekData[mo]).map(Number).sort((a,b)=>a-b) : [];
    for (const wk of weeks) {
      const sums = { 수주:0, 생산:0, 출고:0, 불량:0 };
      for (const it of items) {
        const w = it.weekData?.[mo]?.[wk];
        if (!w) continue;
        for (const me of METRICS) sums[me] += w[me] || 0;
      }
      // 전부 0이면 미진행 주차 — 표시 제외
      if (sums.수주 + sums.생산 + sums.출고 + sums.불량 > 0) {
        out.push({ label: `${mo}월${wk}주`, mo, wk, ...sums });
      }
    }
  }
  return out;
}

/* ============================================================
   렌더링
   ============================================================ */
function getData() { return APP.data[APP.dept]; }

function renderMonthChips() {
  const data = getData(); if (!data) return;
  const months = Object.keys(data.weeksByMonth).map(Number).sort((a,b)=>a-b);
  const box = document.getElementById('monthChips');
  box.innerHTML = months.map(m =>
    `<span class="chip chip-month ${APP.selectedMonths.has(m)?'active':''}" onclick="toggleMonth(${m})">${m}월</span>`
  ).join('');
}

function toggleMonth(m) {
  if (APP.selectedMonths.has(m)) APP.selectedMonths.delete(m);
  else APP.selectedMonths.add(m);
  if (APP.selectedMonths.size === 0) APP.selectedMonths.add(m); // 최소 1개
  renderMonthChips(); renderBody();
}

function selectAllMonths() {
  const data = getData(); if (!data) return;
  APP.selectedMonths = new Set(Object.keys(data.weeksByMonth).map(Number));
  renderMonthChips(); renderBody();
}

function selectRecentMonths() {
  const data = getData(); if (!data) return;
  const months = Object.keys(data.weeksByMonth).map(Number).sort((a,b)=>b-a);
  // 실제 데이터가 있는 월만 → 최근 3개
  const aggAll = aggregateByWeek(data.items, months);
  const monthsWithData = [...new Set(aggAll.map(r => r.mo))].sort((a,b)=>b-a).slice(0, 3);
  APP.selectedMonths = new Set(monthsWithData);
  renderMonthChips(); renderBody();
}

function toggleMetric(m) {
  if (APP.activeMetrics.has(m)) {
    if (APP.activeMetrics.size === 1) return;
    APP.activeMetrics.delete(m);
  } else APP.activeMetrics.add(m);
  document.querySelectorAll('.chip.metric').forEach(el => {
    const me = el.dataset.metric;
    const col = METRIC_COLORS[me];
    if (APP.activeMetrics.has(me)) {
      el.classList.add('active'); el.style.opacity='1';
      el.style.background = col + '26'; el.style.borderColor = col + '99';
    } else {
      el.classList.remove('active'); el.style.opacity='0.35';
      el.style.background = 'transparent'; el.style.borderColor = 'rgba(255,255,255,0.12)';
    }
  });
  renderChart();
}

function renderKPI() {
  const data = getData(); if (!data) return;
  const months = [...APP.selectedMonths].sort((a,b)=>a-b);
  const agg = aggregateByWeek(data.items, months);
  if (agg.length === 0) {
    ['kpiOrder','kpiProd','kpiShip','kpiDef'].forEach(id => document.getElementById(id).textContent = '—');
    ['kpiOrderSub','kpiProdSub','kpiShipSub','kpiDefSub'].forEach(id => document.getElementById(id).textContent = '데이터 없음');
    return;
  }
  const cur = agg[agg.length-1];
  const prev = agg[agg.length-2];
  const fmtDelta = (cur, prev) => {
    if (!prev || prev === 0) return `<span style="color:var(--text-muted);">기준 ${cur.label} · 전주 데이터 없음</span>`;
    const diff = cur - prev;
    const rate = diff/prev*100;
    const sign = diff >= 0 ? '▲' : '▼';
    const cls = diff >= 0 ? 'up' : 'down';
    return `<span class="${cls}">${sign} ${Math.abs(rate).toFixed(1)}%</span> · 전주 ${fmtN(prev)}`;
  };
  const def = ['kpiOrder','kpiProd','kpiShip','kpiDef'];
  const subs = ['kpiOrderSub','kpiProdSub','kpiShipSub','kpiDefSub'];
  METRICS.forEach((me, i) => {
    document.getElementById(def[i]).textContent = fmtN(cur[me]);
    document.getElementById(subs[i]).innerHTML = `<div style="font-size:10px;color:var(--text-muted);margin-bottom:3px;">${cur.label}</div>${fmtDelta(cur[me], prev?.[me])}`;
  });
}

function renderChart() {
  const data = getData(); if (!data) return;
  const months = [...APP.selectedMonths].sort((a,b)=>a-b);
  const agg = aggregateByWeek(data.items, months);
  const xData = agg.map(r => r.label);
  const series = METRICS.filter(m => APP.activeMetrics.has(m)).map(m => ({
    name: m,
    type: m === '불량' ? 'bar' : 'line',
    smooth: true,
    symbol: 'circle', symbolSize: 7,
    data: agg.map(r => r[m]),
    yAxisIndex: m === '불량' ? 1 : 0,
    lineStyle: { color: METRIC_COLORS[m], width: 2.5 },
    itemStyle: { color: METRIC_COLORS[m] },
    barWidth: '30%',
  }));

  if (!APP.chart) APP.chart = echarts.init(document.getElementById('chartTrend'));
  APP.chart.setOption({
    backgroundColor: 'transparent',
    textStyle: { fontFamily:'Pretendard', color:'#8A9BBF' },
    tooltip: {
      trigger:'axis', backgroundColor:'#0F1520', borderColor:'#243049', textStyle:{color:'#EDF2FB'},
      formatter(params){
        let h = `<div style="font-weight:700;margin-bottom:4px;">${params[0].axisValue}</div>`;
        params.forEach(p => {
          h += `<div style="display:flex;align-items:center;gap:6px;margin:2px 0;">
            <span style="width:8px;height:8px;border-radius:50%;background:${p.color};display:inline-block;"></span>
            <span>${p.seriesName}:</span>
            <b style="margin-left:auto;padding-left:12px;">${Number(p.value).toLocaleString()}</b></div>`;
        });
        return h;
      }
    },
    legend: { data: METRICS.filter(m => APP.activeMetrics.has(m)), textStyle:{color:'#8A9BBF'}, top:6 },
    grid: { left:55, right:55, top:40, bottom:30 },
    xAxis: { type:'category', data:xData, axisLine:{lineStyle:{color:'#243049'}}, axisLabel:{color:'#8A9BBF', rotate: xData.length > 10 ? 30 : 0} },
    yAxis: [
      { type:'value', name:'수량', nameTextStyle:{color:'#6B7693',fontSize:10}, splitLine:{lineStyle:{color:'#1A2236'}}, axisLabel:{color:'#8A9BBF', formatter:v=>v>=1000?Math.round(v/1000)+'k':v} },
      { type:'value', name:'불량', nameTextStyle:{color:'#E63946',fontSize:10}, splitLine:{show:false}, axisLabel:{color:'#E63946'} },
    ],
    series
  }, true);

  document.getElementById('trendSub').textContent =
    `${months.join('월·')}월 · 주차별 합계 (${agg.length}개 주차)`;
}

function renderTable() {
  const data = getData(); if (!data) return;
  const months = [...APP.selectedMonths].sort((a,b)=>a-b);
  const agg = aggregateByWeek(data.items, months);
  let html = `<table class="exec" style="width:100%;border-collapse:collapse;">
    <thead><tr>
      <th>주차</th>
      <th style="text-align:right">수주</th><th style="text-align:right">Δ수주</th>
      <th style="text-align:right">생산</th><th style="text-align:right">Δ생산</th>
      <th style="text-align:right">출고</th><th style="text-align:right">Δ출고</th>
      <th style="text-align:right">불량</th><th style="text-align:right">불량율</th>
    </tr></thead><tbody>`;
  agg.forEach((r, i) => {
    const prev = i > 0 ? agg[i-1] : null;
    const delta = (cur, prev) => {
      if (!prev || prev === 0) return '<span style="color:var(--text-muted);">—</span>';
      const d = cur - prev;
      const cls = d >= 0 ? 'up' : 'down';
      const sign = d >= 0 ? '▲' : '▼';
      return `<span class="${cls}" style="font-weight:700;">${sign} ${fmtN(Math.abs(d))}</span>`;
    };
    const defRate = r.생산 > 0 ? (r.불량/r.생산*100).toFixed(2)+'%' : '—';
    html += `<tr>
      <td style="font-weight:700;color:var(--text-primary);">${r.label}</td>
      <td style="text-align:right;color:var(--gold);font-weight:600;" class="num">${fmtN(r.수주)}</td>
      <td style="text-align:right;" class="num">${delta(r.수주, prev?.수주)}</td>
      <td style="text-align:right;color:var(--cyan);font-weight:600;" class="num">${fmtN(r.생산)}</td>
      <td style="text-align:right;" class="num">${delta(r.생산, prev?.생산)}</td>
      <td style="text-align:right;color:var(--mint);font-weight:600;" class="num">${fmtN(r.출고)}</td>
      <td style="text-align:right;" class="num">${delta(r.출고, prev?.출고)}</td>
      <td style="text-align:right;color:var(--red);font-weight:600;" class="num">${fmtN(r.불량)}</td>
      <td style="text-align:right;color:var(--text-secondary);" class="num">${defRate}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  if (agg.length === 0) html = '<div style="text-align:center;padding:24px;color:var(--text-muted);">선택된 월에 주간 데이터가 없습니다.</div>';
  document.getElementById('weekTable').innerHTML = html;
}

function renderBody() { renderKPI(); renderChart(); renderTable(); }

function switchDept(dept) {
  if (dept === APP.dept) return;
  if (!APP.data[dept]) { alert(`${dept} 데이터 없음`); return; }
  APP.dept = dept;
  document.getElementById('deptTitle').textContent = dept;
  document.querySelectorAll('.btn[data-dept]').forEach(b => b.classList.toggle('active', b.dataset.dept === dept));
  // 최근 3개월 자동 선택
  selectRecentMonths();
}

window.addEventListener('resize', () => APP.chart && APP.chart.resize());

async function init() {
  async function fetchGviz(gid) {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return resp.text();
  }
  try {
    const [csv1, csv2] = await Promise.all([
      fetchGviz(GIDS['1반']).catch(() => null),
      fetchGviz(GIDS['2반']).catch(() => null),
    ]);
    if (csv1) APP.data['1반'] = parseSheet(csv1, '1반');
    if (csv2) APP.data['2반'] = parseSheet(csv2, '2반');

    if (!APP.data['1반'] && !APP.data['2반']) throw new Error('데이터 없음');
    if (!APP.data['1반']) { APP.dept = '2반'; document.getElementById('deptTitle').textContent = '2반'; }

    const now = new Date();
    document.getElementById('syncDate').textContent =
      `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    document.querySelectorAll('.btn[data-dept]').forEach(b => {
      b.classList.toggle('active', b.dataset.dept === APP.dept);
      if (!APP.data[b.dataset.dept]) { b.style.opacity = '0.4'; b.title = '데이터 없음'; }
    });

    document.getElementById('loadingOverlay').style.display = 'none';
    selectRecentMonths();
  } catch (err) {
    document.getElementById('loadingOverlay').innerHTML = `
      <div style="text-align:center;padding:40px;">
        <div style="font-size:18px;color:#E63946;font-weight:700;">데이터 로딩 실패</div>
        <div style="font-size:12px;color:#6B7693;margin-top:14px;">${err.message}</div>
        <div style="font-size:11px;color:#6B7693;margin-top:8px;">시트 공유 설정(링크가 있는 모든 사용자 → 뷰어) 확인 필요</div>
      </div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
