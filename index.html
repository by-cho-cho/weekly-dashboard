<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>생산부 주간 대시보드</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0A0E18;
    --bg-card: #131826;
    --bg-card-hi: #1A2032;
    --border: #243049;
    --text-primary: #EDF2FB;
    --text-secondary: #B8C2D9;
    --text-muted: #6B7693;
    --gold: #C9A961;
    --cyan: #4FC3F7;
    --mint: #00E5A0;
    --red: #E63946;
    --amber: #FFB547;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Pretendard', -apple-system, sans-serif;
    font-size: 13px;
  }
  body {
    background:
      radial-gradient(ellipse at top, rgba(201,169,97,0.08), transparent 50%),
      radial-gradient(ellipse at bottom, rgba(79,195,247,0.05), transparent 50%),
      var(--bg-deep);
    min-height: 100vh;
  }
  .num { font-family: 'IBM Plex Sans', sans-serif; font-variant-numeric: tabular-nums; }
  .card {
    background: linear-gradient(135deg, var(--bg-card), var(--bg-card-hi));
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }
  .header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,14,24,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
  }
  .btn {
    padding: 7px 14px; border-radius: 8px; font-weight: 700; font-size: 12px;
    cursor: pointer; border: 1px solid var(--border);
    background: rgba(255,255,255,0.03); color: var(--text-secondary);
    transition: all .2s;
  }
  .btn:hover { background: rgba(255,255,255,0.06); }
  .btn.active {
    background: linear-gradient(135deg, rgba(201,169,97,0.22), rgba(201,169,97,0.08));
    border-color: var(--gold); color: var(--gold);
  }
  .btn[data-dept="2반"].active {
    background: linear-gradient(135deg, rgba(230,57,70,0.22), rgba(230,57,70,0.08));
    border-color: var(--red); color: var(--red);
  }
  .chip {
    display: inline-flex; align-items: center;
    padding: 4px 11px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    cursor: pointer; border: 1px solid; transition: all .12s;
    user-select: none; -webkit-user-select: none;
    line-height: 1.4;
  }
  .chip-month        { color: var(--cyan); border-color: rgba(79,195,247,0.35); background: rgba(79,195,247,0.05); }
  .chip-month.active { background: rgba(79,195,247,0.25); border-color: var(--cyan); box-shadow:0 0 6px rgba(79,195,247,0.3); }
  .chip-item         { color: var(--text-secondary); border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.03); font-size: 10px; padding:3px 9px;}
  .chip-item.active  { color: var(--gold); border-color: var(--gold); background: rgba(201,169,97,0.18); box-shadow:0 0 5px rgba(201,169,97,0.25);}
  .kpi-label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .kpi-val { font-size: 28px; font-weight: 700; font-family: 'IBM Plex Sans', sans-serif; font-variant-numeric: tabular-nums; line-height: 1.1; }
  .kpi-sub { font-size: 11px; color: var(--text-secondary); margin-top: 6px; }
  .up   { color: var(--mint); }
  .down { color: var(--red); }
  table.exec th, table.exec td { padding: 8px 12px; }
  table.exec thead th {
    background: rgba(255,255,255,0.03); color: var(--text-muted);
    font-size: 11px; font-weight: 600; text-align: left;
    border-bottom: 1px solid var(--border);
  }
  table.exec tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); }
  table.exec tbody tr:hover { background: rgba(255,255,255,0.02); }
  .filter-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; padding:3px 0; }
  .filter-label { font-size:11px; font-weight:700; color:var(--text-muted); min-width:50px; }
  .filter-grid { display:flex; flex-wrap:wrap; gap:4px; flex:1; user-select:none; -webkit-user-select:none; }
  .comment-box {
    background: linear-gradient(135deg, rgba(201,169,97,0.08), rgba(79,195,247,0.04));
    border: 1px solid rgba(201,169,97,0.25);
    border-left: 3px solid var(--gold);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 12px;
    line-height: 1.85;
  }
</style>
</head>
<body>

<!-- 로딩 -->
<div id="loadingOverlay" style="position:fixed;inset:0;z-index:99999;background:rgba(10,14,24,0.97);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
  <div style="font-size:18px;color:#C9A961;font-weight:700;letter-spacing:0.05em;">주간 데이터 로딩 중</div>
  <div style="width:220px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;">
    <div style="height:100%;background:linear-gradient(90deg,#C9A961,#4FC3F7);animation:ldbar 1.6s ease-in-out infinite;"></div>
  </div>
  <style>@keyframes ldbar{0%{transform:translateX(-100%)}50%{transform:translateX(60%)}100%{transform:translateX(220%)}}</style>
</div>

<!-- 헤더 -->
<header class="header">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
    <div>
      <h1 style="font-size:20px;font-weight:800;margin:0;letter-spacing:-0.01em;">
        생산<span id="deptTitle" style="color:var(--gold);">1반</span> <span style="color:var(--text-muted);font-size:14px;font-weight:600;">주간 변동 현황</span>
      </h1>
      <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">
        <span id="syncDate">—</span> 기준 · 드래그로 다중 선택
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <span style="font-size:10px;color:var(--text-muted);">부서</span>
      <button class="btn active" data-dept="1반" onclick="switchDept('1반')">1반 (액상)</button>
      <button class="btn" data-dept="2반" onclick="switchDept('2반')">2반 (카테터)</button>
    </div>
  </div>

  <!-- 월 필터 -->
  <div class="filter-row" style="margin-top:10px;padding-top:8px;border-top:1px dashed rgba(255,255,255,0.08);">
    <span class="filter-label">월</span>
    <div class="filter-grid" id="monthChips"></div>
    <button class="btn" onclick="selectAllMonths()" style="font-size:10px;padding:4px 10px;">전체</button>
    <button class="btn" onclick="selectRecentMonths()" style="font-size:10px;padding:4px 10px;">최근 3개월</button>
  </div>

  <!-- 품목 필터 -->
  <div class="filter-row">
    <span class="filter-label">품목 <span id="itemCount" style="font-weight:400;color:var(--text-muted);font-size:10px;">—</span></span>
    <div class="filter-grid" id="itemChips" style="max-height:80px;overflow-y:auto;"></div>
    <input id="itemSearch" placeholder="🔍 검색" oninput="renderItemChips()"
      style="background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text-primary);
             border-radius:8px;padding:5px 10px;font-size:11px;width:160px;outline:none;">
    <button class="btn" onclick="selectAllItems()" style="font-size:10px;padding:4px 10px;">전체</button>
    <button class="btn" onclick="clearItems()" style="font-size:10px;padding:4px 10px;">해제</button>
  </div>
</header>

<!-- KPI -->
<section style="padding:16px 32px 0;">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">
    <div class="card">
      <div class="kpi-label">최근주 수주</div>
      <div class="kpi-val" style="color:var(--gold);" id="kpiOrder">—</div>
      <div class="kpi-sub" id="kpiOrderSub">—</div>
    </div>
    <div class="card">
      <div class="kpi-label">최근주 생산</div>
      <div class="kpi-val" style="color:var(--cyan);" id="kpiProd">—</div>
      <div class="kpi-sub" id="kpiProdSub">—</div>
    </div>
    <div class="card">
      <div class="kpi-label">최근주 출고</div>
      <div class="kpi-val" style="color:var(--mint);" id="kpiShip">—</div>
      <div class="kpi-sub" id="kpiShipSub">—</div>
    </div>
    <div class="card">
      <div class="kpi-label">최근주 불량</div>
      <div class="kpi-val" style="color:var(--red);" id="kpiDef">—</div>
      <div class="kpi-sub" id="kpiDefSub">—</div>
    </div>
  </div>
</section>

<!-- 자동 코멘트 -->
<section style="padding:14px 32px 0;">
  <div class="comment-box" id="commentBox">분석 중…</div>
</section>

<!-- 차트 -->
<section style="padding:14px 32px 0;">
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;">
      <div>
        <div class="kpi-label">주간 추이 (수주 · 생산 · 출고 · 불량)</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px;" id="trendSub">—</div>
      </div>
      <div style="display:flex;gap:4px;align-items:center;padding:4px 8px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;">
        <span style="font-size:10px;color:var(--text-muted);margin-right:2px;">지표</span>
        <span class="chip metric active" data-metric="수주" onclick="toggleMetric('수주')" style="color:#C9A961;border-color:rgba(201,169,97,0.4);background:rgba(201,169,97,0.15);">수주</span>
        <span class="chip metric active" data-metric="생산" onclick="toggleMetric('생산')" style="color:#4FC3F7;border-color:rgba(79,195,247,0.4);background:rgba(79,195,247,0.15);">생산</span>
        <span class="chip metric active" data-metric="출고" onclick="toggleMetric('출고')" style="color:#00E5A0;border-color:rgba(0,229,160,0.4);background:rgba(0,229,160,0.15);">출고</span>
        <span class="chip metric active" data-metric="불량" onclick="toggleMetric('불량')" style="color:#E63946;border-color:rgba(230,57,70,0.4);background:rgba(230,57,70,0.15);">불량</span>
      </div>
    </div>
    <div id="chartTrend" style="height:380px;"></div>
  </div>
</section>

<!-- 상세표 -->
<section style="padding:14px 32px 30px;">
  <div class="card">
    <div class="kpi-label">주차별 상세 (전주 대비)</div>
    <div id="weekTable" style="margin-top:10px;"></div>
  </div>
</section>

<script>
const SHEET_ID = '1SX8ZOh2i4LrH9X7HSQ3RhrxREeGl7Vl6qcu42Uf8qro';
const GIDS = { '1반': '2145094968', '2반': '680125344' };
const METRICS = ['수주','생산','출고','불량'];
const METRIC_COLORS = { '수주':'#C9A961', '생산':'#4FC3F7', '출고':'#00E5A0', '불량':'#E63946' };
const APP = {
  dept: '1반',
  data: { '1반': null, '2반': null },
  selectedMonths: new Set(),
  selectedItems: { '1반': new Set(), '2반': new Set() },
  activeMetrics: new Set(METRICS),
  chart: null,
};

function parseCSV(text){
  const rows=[]; let row=[],cell='',q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cell+='"';i++;} else q=false; } else cell+=c; }
    else { if(c==='"')q=true;
      else if(c===','){row.push(cell);cell='';}
      else if(c==='\n'){row.push(cell);rows.push(row);row=[];cell='';}
      else if(c!=='\r')cell+=c; }
  }
  if(cell||row.length){row.push(cell);rows.push(row);}
  return rows;
}
const parseNum = v => {
  if (v == null || v === '') return 0;
  const n = Number(String(v).replace(/,/g, '').trim());
  return isFinite(n) ? n : 0;
};
const fmtN = v => v == null ? '—' : Math.round(v).toLocaleString();

/* ============================================================
   2반 파서 — 명시적 "M-W 수주" 헤더 기반
   ============================================================ */
function parse2Ban(csvText) {
  const rows = parseCSV(csvText);
  const headers = rows[0] || [];
  // weekly columns map
  const wmap = {};
  for (let i = 0; i < headers.length; i++) {
    const h = (headers[i]||'').trim();
    const m = h.match(/^(\d{1,2})-(\d)\s*수주$/);
    if (m) {
      const mo = +m[1], wk = +m[2];
      wmap[mo] = wmap[mo] || {};
      wmap[mo][wk] = { 수주: i, 생산: i+2, 출고: i+3, 불량: i+4 };
    }
  }
  const items = [];
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r]; if (!row) continue;
    const model = (row[0]||'').trim();
    const spec = (row[1]||'').trim();
    if (!model) continue;
    if (/^(total|item|품명|품목|spec|규격|전품목)$/i.test(model)) continue;
    if (/^(EP|ENBD|Cable\s*total|Cable|EPO\s*Probe)$/i.test(model)) continue; // 카테고리 헤더
    const weekData = {}; let hasAny = false;
    for (const mo of Object.keys(wmap)) {
      weekData[mo] = {};
      for (const wk of Object.keys(wmap[mo])) {
        const c = wmap[mo][wk];
        const w = {};
        for (const me of METRICS) w[me] = parseNum(row[c[me]]);
        weekData[mo][wk] = w;
        if (w.수주 + w.생산 + w.출고 + w.불량 > 0) hasAny = true;
      }
    }
    if (!hasAny) continue;
    items.push({ model, spec, weekData });
  }
  return { items, weeksByMonth: getWeeksByMonth(wmap) };
}

/* ============================================================
   1반 파서 — 위치 기반 (행1의 "1"~"12" 마커 스캔)
   각 주: 7개 컬럼 = [수주, 계획, 생산, 출고, 불량, 성능, 외관]
   ============================================================ */
function parse1Ban(csvText) {
  const rows = parseCSV(csvText);
  if (rows.length < 6) return null;

  // 행1에서 월 마커 찾기 — 단, monthly section (1~12)의 두번째 반복 (col 155+ 정도)
  const row1 = rows[0] || [];
  const markers = [];
  for (let i = 155; i < row1.length; i++) {
    const v = (row1[i]||'').trim();
    if (/^([1-9]|1[0-2])$/.test(v)) markers.push({ mo: +v, col: i });
  }
  if (markers.length === 0) return null;

  // 각 월의 주차별 컬럼 매핑 — 다음 월의 시작점까지 7씩 stride
  const wmap = {};
  for (let i = 0; i < markers.length; i++) {
    const cur = markers[i];
    const next = markers[i+1];
    const endCol = next ? next.col : Math.min(cur.col + 40, row1.length);
    wmap[cur.mo] = {};
    let wk = 1;
    // 마커 col 다음부터 7씩 증가
    for (let c = cur.col + 1; c + 4 < endCol; c += 7) {
      wmap[cur.mo][wk] = { 수주: c, 생산: c+2, 출고: c+3, 불량: c+4 };
      wk++;
      if (wk > 5) break;
    }
  }

  // 데이터 행 파싱
  const modelCol = 2, specCol = 3;
  const items = [];
  for (let r = 5; r < rows.length; r++) {  // 데이터는 row 6+ 부터 (0-indexed = 5)
    const row = rows[r]; if (!row) continue;
    const model = (row[modelCol]||'').trim();
    const spec = (row[specCol]||'').trim();
    if (!model) continue;
    if (/^(total|item|품명|품목|spec|규격|전품목)$/i.test(model)) continue;

    const weekData = {}; let hasAny = false;
    for (const mo of Object.keys(wmap)) {
      weekData[mo] = {};
      for (const wk of Object.keys(wmap[mo])) {
        const c = wmap[mo][wk];
        const w = {};
        for (const me of METRICS) w[me] = parseNum(row[c[me]]);
        weekData[mo][wk] = w;
        if (w.수주 + w.생산 + w.출고 + w.불량 > 0) hasAny = true;
      }
    }
    if (!hasAny) continue;
    items.push({ model, spec, weekData });
  }
  return { items, weeksByMonth: getWeeksByMonth(wmap) };
}

function getWeeksByMonth(wmap) {
  const r = {};
  for (const mo of Object.keys(wmap)) r[+mo] = Object.keys(wmap[mo]).map(Number).sort((a,b)=>a-b);
  return r;
}

/* ============================================================
   집계
   ============================================================ */
function getData() { return APP.data[APP.dept]; }
function getSelectedItems() { return APP.selectedItems[APP.dept]; }

function filterItems(items) {
  const sel = getSelectedItems();
  if (sel.size === 0) return items;  // 전체
  return items.filter(it => sel.has(it.model));
}

function aggregateByWeek(items, months) {
  const out = [];
  for (const mo of months) {
    const wks = items[0]?.weekData?.[mo] ? Object.keys(items[0].weekData[mo]).map(Number).sort((a,b)=>a-b) : [];
    for (const wk of wks) {
      const sums = { 수주:0, 생산:0, 출고:0, 불량:0 };
      for (const it of items) {
        const w = it.weekData?.[mo]?.[wk];
        if (!w) continue;
        for (const me of METRICS) sums[me] += w[me] || 0;
      }
      if (sums.수주 + sums.생산 + sums.출고 + sums.불량 > 0) {
        out.push({ label: `${mo}월${wk}주`, mo, wk, ...sums });
      }
    }
  }
  return out;
}

/* ============================================================
   렌더링
   ============================================================ */
function renderMonthChips() {
  const data = getData(); if (!data) return;
  const months = Object.keys(data.weeksByMonth).map(Number).sort((a,b)=>a-b);
  const box = document.getElementById('monthChips');
  box.innerHTML = months.map(m =>
    `<span class="chip chip-month ${APP.selectedMonths.has(m)?'active':''}" data-ftype="month" data-fval="${m}">${m}월</span>`
  ).join('');
}

function renderItemChips() {
  const data = getData(); if (!data) return;
  const sel = getSelectedItems();
  const search = (document.getElementById('itemSearch')?.value || '').toLowerCase().trim();
  const allItems = data.items;
  const visible = search
    ? allItems.filter(it => it.model.toLowerCase().includes(search) || (it.spec||'').toLowerCase().includes(search))
    : allItems;
  const box = document.getElementById('itemChips');
  box.innerHTML = visible.map(it =>
    `<span class="chip chip-item ${sel.has(it.model)?'active':''}" data-ftype="item" data-fval="${escapeAttr(it.model)}" title="${escapeAttr(it.spec||'')}">${it.model}</span>`
  ).join('');
  document.getElementById('itemCount').textContent =
    sel.size === 0 ? `(전체 ${allItems.length}개)` : `(${sel.size}/${allItems.length}개 선택)`;
}

function escapeAttr(s) { return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function selectAllMonths() {
  const data = getData(); if (!data) return;
  APP.selectedMonths = new Set(Object.keys(data.weeksByMonth).map(Number));
  renderMonthChips(); renderBody();
}

function selectRecentMonths() {
  const data = getData(); if (!data) return;
  const months = Object.keys(data.weeksByMonth).map(Number).sort((a,b)=>b-a);
  const aggAll = aggregateByWeek(data.items, months);
  const monthsWithData = [...new Set(aggAll.map(r => r.mo))].sort((a,b)=>b-a).slice(0, 3);
  APP.selectedMonths = new Set(monthsWithData.length ? monthsWithData : months.slice(0, 3));
  renderMonthChips(); renderBody();
}

function selectAllItems() { APP.selectedItems[APP.dept] = new Set(); renderItemChips(); renderBody(); }
function clearItems() { APP.selectedItems[APP.dept] = new Set(); renderItemChips(); renderBody(); }

function toggleMetric(m) {
  if (APP.activeMetrics.has(m)) {
    if (APP.activeMetrics.size === 1) return;
    APP.activeMetrics.delete(m);
  } else APP.activeMetrics.add(m);
  document.querySelectorAll('.chip.metric').forEach(el => {
    const me = el.dataset.metric;
    const col = METRIC_COLORS[me];
    if (APP.activeMetrics.has(me)) {
      el.classList.add('active'); el.style.opacity='1';
      el.style.background = col + '26'; el.style.borderColor = col + '99';
    } else {
      el.classList.remove('active'); el.style.opacity='0.35';
      el.style.background = 'transparent'; el.style.borderColor = 'rgba(255,255,255,0.12)';
    }
  });
  renderChart();
}

/* ============================================================
   드래그 선택 — 칩 위에서 마우스 드래그 시 일괄 토글
   ============================================================ */
const DRAG = { active:false, mode:null, touched:new Set(), moved:false, suppressClick:false };

function setFilterState(type, val, on) {
  if (type === 'month') {
    val = +val;
    if (on) APP.selectedMonths.add(val);
    else APP.selectedMonths.delete(val);
  } else if (type === 'item') {
    const set = getSelectedItems();
    if (on) set.add(val);
    else set.delete(val);
  }
}

function isFilterOn(type, val) {
  if (type === 'month') return APP.selectedMonths.has(+val);
  if (type === 'item') return getSelectedItems().has(val);
  return false;
}

function applyChipDrag(el) {
  if (!el || !el.dataset.ftype) return;
  const k = `${el.dataset.ftype}|${el.dataset.fval}`;
  if (DRAG.touched.has(k)) return;
  DRAG.touched.add(k);
  setFilterState(el.dataset.ftype, el.dataset.fval, DRAG.mode);
  el.classList.toggle('active', DRAG.mode);
}

function chipUnderPoint(x, y) {
  const el = document.elementFromPoint(x, y);
  if (el && el.dataset && el.dataset.ftype) return el;
  return null;
}

document.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  const el = e.target.closest('[data-ftype]');
  if (!el) return;
  DRAG.active = true;
  DRAG.mode = !isFilterOn(el.dataset.ftype, el.dataset.fval);
  DRAG.touched = new Set();
  DRAG.moved = false;
  applyChipDrag(el);
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (!DRAG.active) return;
  DRAG.moved = true;
  const el = chipUnderPoint(e.clientX, e.clientY);
  if (el) applyChipDrag(el);
});

document.addEventListener('mouseup', () => {
  if (!DRAG.active) return;
  DRAG.active = false;
  DRAG.touched.clear();
  DRAG.suppressClick = true;
  setTimeout(() => { DRAG.suppressClick = false; }, 50);
  // 월 최소 1개 보장
  if (APP.selectedMonths.size === 0) {
    const data = getData();
    if (data) {
      const months = Object.keys(data.weeksByMonth).map(Number).sort((a,b)=>b-a);
      if (months.length) APP.selectedMonths.add(months[0]);
    }
  }
  renderMonthChips();
  renderItemChips();
  renderBody();
});

/* ============================================================
   KPI / 코멘트 / 차트 / 표
   ============================================================ */
function renderKPI() {
  const data = getData(); if (!data) return;
  const months = [...APP.selectedMonths].sort((a,b)=>a-b);
  const agg = aggregateByWeek(filterItems(data.items), months);
  const ids = {수주:['kpiOrder','kpiOrderSub'], 생산:['kpiProd','kpiProdSub'], 출고:['kpiShip','kpiShipSub'], 불량:['kpiDef','kpiDefSub']};
  if (agg.length === 0) {
    for (const m of METRICS) {
      document.getElementById(ids[m][0]).textContent = '—';
      document.getElementById(ids[m][1]).textContent = '데이터 없음';
    }
    return;
  }
  const cur = agg[agg.length-1];
  const prev = agg[agg.length-2];
  const fmtDelta = (c, p) => {
    if (p == null || p === 0) return `<span style="color:var(--text-muted);">전주 비교 없음</span>`;
    const d = c - p;
    const rate = d/p*100;
    const sign = d >= 0 ? '▲' : '▼';
    const cls = d >= 0 ? 'up' : 'down';
    return `<span class="${cls}">${sign} ${Math.abs(rate).toFixed(1)}%</span> · 전주 ${fmtN(p)}`;
  };
  METRICS.forEach(me => {
    document.getElementById(ids[me][0]).textContent = fmtN(cur[me]);
    document.getElementById(ids[me][1]).innerHTML =
      `<div style="font-size:10px;color:var(--text-muted);margin-bottom:3px;">${cur.label}</div>${fmtDelta(cur[me], prev?.[me])}`;
  });
}

function renderComment() {
  const box = document.getElementById('commentBox');
  const data = getData(); if (!data) { box.textContent = '데이터 없음'; return; }
  const months = [...APP.selectedMonths].sort((a,b)=>a-b);
  const items = filterItems(data.items);
  const agg = aggregateByWeek(items, months);
  if (agg.length < 2) {
    box.innerHTML = '<span style="color:var(--text-muted);">전주 비교를 위해 최소 2개 주차 데이터가 필요합니다. 월 범위를 늘려보세요.</span>';
    return;
  }
  const cur = agg[agg.length-1];
  const prev = agg[agg.length-2];
  const lines = [];
  const itemCnt = getSelectedItems().size === 0 ? `전체 ${items.length}품목` : `${getSelectedItems().size}품목 선택`;
  lines.push(`<b style="color:var(--gold);">${cur.label}</b> 실적 — ${itemCnt} 기준`);

  // 주요 지표 변동
  const deltas = METRICS.map(me => {
    const c = cur[me], p = prev[me];
    const d = c - p;
    const rate = p > 0 ? d/p*100 : null;
    return { me, c, p, d, rate };
  });

  // 수주/생산/출고
  const orderD = deltas.find(d => d.me==='수주');
  const prodD = deltas.find(d => d.me==='생산');
  const shipD = deltas.find(d => d.me==='출고');
  const defD = deltas.find(d => d.me==='불량');

  const tone = (d) => {
    if (d.rate == null) return `<span style="color:var(--text-muted);">전주 미실적</span>`;
    if (d.rate >= 0) return `<span class="up">${fmtN(d.c)}개 (전주比 ▲${d.rate.toFixed(1)}%, +${fmtN(d.d)})</span>`;
    return `<span class="down">${fmtN(d.c)}개 (전주比 ▼${Math.abs(d.rate).toFixed(1)}%, ${fmtN(d.d)})</span>`;
  };

  lines.push(`▶ 수주 ${tone(orderD)}, 생산 ${tone(prodD)}, 출고 ${tone(shipD)}.`);

  // 불량
  const defRateCur = cur.생산 > 0 ? cur.불량/cur.생산*100 : null;
  const defRatePrev = prev.생산 > 0 ? prev.불량/prev.생산*100 : null;
  if (defRateCur != null) {
    let qual = '양호';
    if (defRateCur > 2) qual = '<span class="down">심각</span>';
    else if (defRateCur > 1) qual = '<span style="color:var(--amber);">주의</span>';
    else if (defRateCur > 0.5) qual = '<span style="color:var(--gold);">관리</span>';
    else qual = '<span class="up">우수</span>';
    let cmp = '';
    if (defRatePrev != null) {
      const dr = defRateCur - defRatePrev;
      cmp = dr >= 0
        ? ` (전주 ${defRatePrev.toFixed(2)}% → <span class="down">+${dr.toFixed(2)}%p</span>)`
        : ` (전주 ${defRatePrev.toFixed(2)}% → <span class="up">${dr.toFixed(2)}%p</span>)`;
    }
    lines.push(`▶ 품질 ${qual} — 불량율 <b>${defRateCur.toFixed(2)}%</b>${cmp}, 불량 ${fmtN(cur.불량)}개 / 생산 ${fmtN(cur.생산)}개.`);
  }

  // 종합 톤
  const upCnt = deltas.filter(d => d.me !== '불량' && d.rate != null && d.rate > 0).length;
  const downCnt = deltas.filter(d => d.me !== '불량' && d.rate != null && d.rate < 0).length;
  let verdict;
  if (upCnt >= 2 && (defD.rate == null || defD.rate <= 0))
    verdict = `<span class="up">📈 전반적 상승세 — 추세 유지 시 다음주 호조 예상.</span>`;
  else if (downCnt >= 2)
    verdict = `<span class="down">📉 전반적 하락 — 수주 파이프라인 점검 필요.</span>`;
  else if (defRateCur != null && defRateCur > 2)
    verdict = `<span style="color:var(--amber);">⚠ 불량율 상승 — 공정 점검 권고.</span>`;
  else
    verdict = `<span style="color:var(--gold);">⚡ 보합 유지 — 특이사항 없음.</span>`;
  lines.push(`▶ ${verdict}`);

  // 품목별 TOP 변동 (선택된 품목만, 생산 기준)
  if (items.length > 1) {
    const moves = items.map(it => {
      const c = it.weekData?.[cur.mo]?.[cur.wk]?.생산 || 0;
      const p = it.weekData?.[prev.mo]?.[prev.wk]?.생산 || 0;
      return { model: it.model, c, p, d: c - p };
    }).filter(m => m.c + m.p >= 5);
    const topUp = [...moves].filter(m => m.d > 0).sort((a,b) => b.d - a.d)[0];
    const topDn = [...moves].filter(m => m.d < 0).sort((a,b) => a.d - b.d)[0];
    const parts = [];
    if (topUp) parts.push(`<span class="up">▲ ${topUp.model} +${fmtN(topUp.d)}</span>`);
    if (topDn) parts.push(`<span class="down">▼ ${topDn.model} ${fmtN(topDn.d)}</span>`);
    if (parts.length) lines.push(`▶ 품목별 주목: ${parts.join(' · ')}.`);
  }

  box.innerHTML = lines.map(l => `<div>${l}</div>`).join('');
}

function renderChart() {
  const data = getData(); if (!data) return;
  const months = [...APP.selectedMonths].sort((a,b)=>a-b);
  const items = filterItems(data.items);
  const agg = aggregateByWeek(items, months);
  const xData = agg.map(r => r.label);
  const series = METRICS.filter(m => APP.activeMetrics.has(m)).map(m => ({
    name: m,
    type: m === '불량' ? 'bar' : 'line',
    smooth: true, symbol: 'circle', symbolSize: 7,
    data: agg.map(r => r[m]),
    yAxisIndex: m === '불량' ? 1 : 0,
    lineStyle: { color: METRIC_COLORS[m], width: 2.5 },
    itemStyle: { color: METRIC_COLORS[m] },
    barWidth: '30%',
  }));
  if (!APP.chart) APP.chart = echarts.init(document.getElementById('chartTrend'));
  APP.chart.setOption({
    backgroundColor: 'transparent',
    textStyle: { fontFamily:'Pretendard', color:'#8A9BBF' },
    tooltip: {
      trigger:'axis', backgroundColor:'#0F1520', borderColor:'#243049', textStyle:{color:'#EDF2FB'},
      formatter(params){
        let h = `<div style="font-weight:700;margin-bottom:4px;">${params[0].axisValue}</div>`;
        params.forEach(p => {
          h += `<div style="display:flex;align-items:center;gap:6px;margin:2px 0;">
            <span style="width:8px;height:8px;border-radius:50%;background:${p.color};display:inline-block;"></span>
            <span>${p.seriesName}:</span>
            <b style="margin-left:auto;padding-left:12px;">${Number(p.value).toLocaleString()}</b></div>`;
        });
        return h;
      }
    },
    legend: { data: METRICS.filter(m => APP.activeMetrics.has(m)), textStyle:{color:'#8A9BBF'}, top:6 },
    grid: { left:55, right:55, top:40, bottom:30 },
    xAxis: { type:'category', data:xData, axisLine:{lineStyle:{color:'#243049'}}, axisLabel:{color:'#8A9BBF', rotate: xData.length > 10 ? 30 : 0} },
    yAxis: [
      { type:'value', name:'수량', nameTextStyle:{color:'#6B7693',fontSize:10}, splitLine:{lineStyle:{color:'#1A2236'}}, axisLabel:{color:'#8A9BBF', formatter:v=>v>=1000?Math.round(v/1000)+'k':v} },
      { type:'value', name:'불량', nameTextStyle:{color:'#E63946',fontSize:10}, splitLine:{show:false}, axisLabel:{color:'#E63946'} },
    ],
    series
  }, true);
  const itemLabel = getSelectedItems().size === 0 ? `전체 ${items.length}품목` : `${getSelectedItems().size}품목 선택`;
  document.getElementById('trendSub').textContent = `${months.join('월·')}월 · ${itemLabel} · ${agg.length}개 주차`;
}

function renderTable() {
  const data = getData(); if (!data) return;
  const months = [...APP.selectedMonths].sort((a,b)=>a-b);
  const agg = aggregateByWeek(filterItems(data.items), months);
  let html = `<table class="exec" style="width:100%;border-collapse:collapse;">
    <thead><tr>
      <th>주차</th>
      <th style="text-align:right">수주</th><th style="text-align:right">Δ수주</th>
      <th style="text-align:right">생산</th><th style="text-align:right">Δ생산</th>
      <th style="text-align:right">출고</th><th style="text-align:right">Δ출고</th>
      <th style="text-align:right">불량</th><th style="text-align:right">불량율</th>
    </tr></thead><tbody>`;
  agg.forEach((r, i) => {
    const prev = i > 0 ? agg[i-1] : null;
    const delta = (c, p) => {
      if (p == null || p === 0) return '<span style="color:var(--text-muted);">—</span>';
      const d = c - p;
      const cls = d >= 0 ? 'up' : 'down';
      const sign = d >= 0 ? '▲' : '▼';
      return `<span class="${cls}" style="font-weight:700;">${sign} ${fmtN(Math.abs(d))}</span>`;
    };
    const defRate = r.생산 > 0 ? (r.불량/r.생산*100).toFixed(2)+'%' : '—';
    html += `<tr>
      <td style="font-weight:700;">${r.label}</td>
      <td style="text-align:right;color:var(--gold);font-weight:600;" class="num">${fmtN(r.수주)}</td>
      <td style="text-align:right;" class="num">${delta(r.수주, prev?.수주)}</td>
      <td style="text-align:right;color:var(--cyan);font-weight:600;" class="num">${fmtN(r.생산)}</td>
      <td style="text-align:right;" class="num">${delta(r.생산, prev?.생산)}</td>
      <td style="text-align:right;color:var(--mint);font-weight:600;" class="num">${fmtN(r.출고)}</td>
      <td style="text-align:right;" class="num">${delta(r.출고, prev?.출고)}</td>
      <td style="text-align:right;color:var(--red);font-weight:600;" class="num">${fmtN(r.불량)}</td>
      <td style="text-align:right;color:var(--text-secondary);" class="num">${defRate}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  if (agg.length === 0) html = '<div style="text-align:center;padding:24px;color:var(--text-muted);">선택된 조건에 주간 데이터가 없습니다.</div>';
  document.getElementById('weekTable').innerHTML = html;
}

function renderBody() { renderKPI(); renderComment(); renderChart(); renderTable(); }

function switchDept(dept) {
  if (dept === APP.dept) return;
  if (!APP.data[dept]) { alert(`${dept} 데이터 없음`); return; }
  APP.dept = dept;
  document.getElementById('deptTitle').textContent = dept;
  document.querySelectorAll('.btn[data-dept]').forEach(b => b.classList.toggle('active', b.dataset.dept === dept));
  document.getElementById('itemSearch').value = '';
  renderItemChips();
  selectRecentMonths();
}

window.addEventListener('resize', () => APP.chart && APP.chart.resize());

async function init() {
  async function fetchGviz(gid) {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return resp.text();
  }
  try {
    const [csv1, csv2] = await Promise.all([
      fetchGviz(GIDS['1반']).catch(() => null),
      fetchGviz(GIDS['2반']).catch(() => null),
    ]);
    if (csv1) APP.data['1반'] = parse1Ban(csv1);
    if (csv2) APP.data['2반'] = parse2Ban(csv2);

    if (!APP.data['1반'] && !APP.data['2반']) throw new Error('데이터 없음');
    if (!APP.data['1반']?.items?.length && APP.data['2반']?.items?.length) {
      APP.dept = '2반';
      document.getElementById('deptTitle').textContent = '2반';
    }

    const now = new Date();
    document.getElementById('syncDate').textContent =
      `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    document.querySelectorAll('.btn[data-dept]').forEach(b => {
      b.classList.toggle('active', b.dataset.dept === APP.dept);
      if (!APP.data[b.dataset.dept]?.items?.length) { b.style.opacity = '0.4'; b.title = '데이터 없음'; }
    });

    document.getElementById('loadingOverlay').style.display = 'none';
    renderItemChips();
    selectRecentMonths();
  } catch (err) {
    document.getElementById('loadingOverlay').innerHTML = `
      <div style="text-align:center;padding:40px;">
        <div style="font-size:18px;color:#E63946;font-weight:700;">데이터 로딩 실패</div>
        <div style="font-size:12px;color:#6B7693;margin-top:14px;">${err.message}</div>
        <div style="font-size:11px;color:#6B7693;margin-top:8px;">시트 공유 설정(링크가 있는 모든 사용자 → 뷰어) 확인 필요</div>
      </div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
